<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | Famous HD Biryani</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: "#C8A45D",
                        "primary-hover": "#B08D45",
                    },
                    fontFamily: {
                        display: ["Playfair Display", "serif"],
                        body: ["Poppins", "sans-serif"],
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Poppins', sans-serif; }
        .glass { background: rgba(30, 30, 30, 0.8); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="bg-[#121212] min-h-screen flex items-center justify-center p-4">
    <div class="max-w-md w-full glass p-8 rounded-2xl border border-primary/20 shadow-2xl">
        <div class="text-center mb-8">
            <span class="font-display text-2xl font-bold text-primary tracking-wider uppercase">Famous HD <span class="text-white">Biryani</span></span>
            <h1 class="text-white text-xl font-semibold mt-4">Admin Control Center</h1>
            <p class="text-gray-400 text-sm mt-2">Authorized Access Only</p>
        </div>

        <form id="login-form" class="space-y-6">
            <div>
                <label class="block text-gray-400 text-sm mb-2" for="email">Email Address</label>
                <div class="relative">
                    <span class="absolute left-3 top-1/2 -translate-y-1/2 text-gray-500">
                        <i class="fas fa-envelope"></i>
                    </span>
                    <input type="email" id="email" required
                        class="w-full bg-gray-900/50 border border-gray-800 text-white pl-10 pr-4 py-3 rounded-xl focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition"
                        placeholder="admin@famoushdbiryani.com">
                </div>
            </div>

            <div>
                <label class="block text-gray-400 text-sm mb-2" for="password">Password</label>
                <div class="relative">
                    <span class="absolute left-3 top-1/2 -translate-y-1/2 text-gray-500">
                        <i class="fas fa-lock"></i>
                    </span>
                    <input type="password" id="password" required
                        class="w-full bg-gray-900/50 border border-gray-800 text-white pl-10 pr-4 py-3 rounded-xl focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition"
                        placeholder="••••••••">
                </div>
            </div>

            <button type="submit"
                class="w-full bg-primary hover:bg-primary-hover text-white font-bold py-4 rounded-xl shadow-lg shadow-primary/20 transition-all flex items-center justify-center gap-2">
                <span>SIGN IN SECURELY</span>
                <i class="fas fa-shield-alt"></i>
            </button>
            
            <div id="error-msg" class="hidden p-3 bg-red-500/10 border border-red-500/50 rounded-lg text-red-500 text-xs text-center">
                Invalid credentials or unauthorized access.
            </div>
        </form>

        <div class="mt-8 pt-6 border-t border-gray-800 text-center">
            <a href="/" class="text-gray-500 hover:text-white text-xs transition">
                <i class="fas fa-arrow-left mr-1"></i> Back to Website
            </a>
        </div>
    </div>

    <!-- Firebase Scripts -->
    <script type="module" src="js/auth.js"></script>
</body>
</html>
